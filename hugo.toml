baseURL = 'https://teusterra.github.io/'
locale = 'pt-br'
title = 'teusterra'
theme = 'PaperMod'
author = 'Mateus Terra'
enableRobotsTXT = true

[params.homeInfoParams]
  Title = "Hi there wave"
  Content = "Can be Info, links, about..."

[[params.socialIcons]]
  name = "<platform>"
  url = "<link>"

[[params.socialIcons]]
  name = "<platform 2>"
  url = "<link2>"

[params]
  contentTypeName = "posts"
  
  [params.header]
    logo = "logo.jpg"
    
  [params.footer]
    since = 2023
    poweredby = true

[[menu.main]]
  identifier = "Home"
  name = "Home"
  pageRef = "/"
  weight = 4

[[menu.main]]
  identifier = "post"
  name = "Posts"
  pageRef = "/posts/"
  weight = 5

[[menu.main]]
  identifier = "search"
  name = "Pesquisa"
  pageRef = "/search/"
  weight = 6

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[security]
  hsts = true
  xssProtection = true
  contentTypeOptions = "nosniff"
  referrerPolicy = "strict-origin-when-cross-origin"